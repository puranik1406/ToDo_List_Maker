{% extends 'base.html' %}

{% block head %}
<title>Tododododo</title>
{% endblock %}

{% block body %}
<h1>To-Do List Maker</h1>
<h2>Update Task</h2>

<div class="content">
    
    <br><br>
    <form action="/update/{{ task.id }}" method="POST">
        <input type="text" name="content" id="update-box" value="{{ task.task }}">
        <br>
        <br>
        <input type="submit" id = "update-button" value="Update Task">
    </form>
</div>

{% endblock %}
